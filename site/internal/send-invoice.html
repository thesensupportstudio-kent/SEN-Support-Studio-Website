<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Send Invoice | SEN Support Studio</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bevan&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css?v=1784200000">
</head>
<body>
<div class="page">

  <div class="internal-bar">Staff Only</div>
  <header class="internal-header">
    <a href="index.html" class="nav-logo">
      <img src="../assets/img/mini-logo-beige.png" alt="SEN Support Studio" />
      <span>Internal Tools</span>
    </a>
    <a href="index.html" class="internal-exit">&larr; Internal Tools</a>
  </header>

  <section class="internal-section">
    <h1>Send Invoice</h1>
    <p class="lede">Attach a school's invoice PDF and send it straight from invoices@sensupportstudio.com, with a standard covering message and a copy to your own inbox.</p>
    <div id="client-context-banner" class="client-context-banner hidden"></div>

    <div class="internal-card">
      <div id="invoice-send-error" class="form-error hidden"></div>

      <form id="invoice-send-form">
        <div class="internal-form-row">
          <div class="form-field">
            <label for="recipient-name">School name</label>
            <input type="text" id="recipient-name" name="recipientName" required placeholder="e.g. Riverside Primary School">
          </div>
          <div class="form-field">
            <label for="recipient-email">School email address</label>
            <input type="email" id="recipient-email" name="recipientEmail" required placeholder="finance@school.sch.uk">
          </div>
        </div>

        <div class="form-field">
          <label for="invoice-service">Service</label>
          <select id="invoice-service" name="service" required>
            <option value="" disabled selected>Choose a service…</option>
            <option value="1:1 Tuition (Parents/Carers) — 1 session — £50">1:1 Tuition (Parents/Carers) — 1 session — £50</option>
            <option value="1:1 Tuition (Parents/Carers) — Monthly pack (4 sessions) — £190">1:1 Tuition (Parents/Carers) — Monthly pack (4 sessions) — £190</option>
            <option value="1:1 Pupil Tuition (Schools) — 1 session — £60">1:1 Pupil Tuition (Schools) — 1 session — £60</option>
            <option value="1:1 Pupil Tuition (Schools) — Term pack (7 sessions) — £399">1:1 Pupil Tuition (Schools) — Term pack (7 sessions) — £399</option>
            <option value="Sensory Profile Builder (Parents/Carers) — £100">Sensory Profile Builder (Parents/Carers) — £100</option>
            <option value="Sensory Profile Builder (Schools) — 1 profile — £100">Sensory Profile Builder (Schools) — 1 profile — £100</option>
            <option value="Sensory Profile Builder (Schools) — Pack of 5 profiles — £475">Sensory Profile Builder (Schools) — Pack of 5 profiles — £475</option>
            <option value="Support Sessions (Parents/Carers) — £50">Support Sessions (Parents/Carers) — £50</option>
            <option value="Sentence Steps Intervention (Schools) — 1 session — £100">Sentence Steps Intervention (Schools) — 1 session — £100</option>
            <option value="Sentence Steps Intervention (Schools) — Term pack (7 sessions) — £665">Sentence Steps Intervention (Schools) — Term pack (7 sessions) — £665</option>
            <option value="Build Buddies Intervention (Schools) — 1 session — £100">Build Buddies Intervention (Schools) — 1 session — £100</option>
            <option value="Build Buddies Intervention (Schools) — Term pack (7 sessions) — £665">Build Buddies Intervention (Schools) — Term pack (7 sessions) — £665</option>
            <option value="other">Other (describe below)</option>
          </select>
        </div>

        <div class="form-field hidden" id="service-other-wrap">
          <label for="service-other-detail">Describe the service</label>
          <input type="text" id="service-other-detail" placeholder="What is this invoice for?">
        </div>

        <div class="form-field">
          <label for="invoice-file">Invoice PDF</label>
          <input type="file" id="invoice-file" name="invoiceFile" accept="application/pdf" required>
        </div>

        <button type="submit" class="form-submit" id="invoice-send-submit">Send Invoice</button>
      </form>

      <div id="invoice-send-success" class="form-success hidden">
        <h3>Invoice sent</h3>
        <p id="invoice-send-success-detail"></p>
        <button type="button" class="form-submit" id="invoice-send-reset">Send another invoice</button>
      </div>
    </div>
  </section>

</div>
<script src="../js/internal-client-context.js?v=1784000000"></script>
<script src="../js/internal-send-invoice.js?v=1784000000"></script>
</body>
</html>
