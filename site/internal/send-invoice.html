<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Send Invoice | SEN Support Studio</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bevan&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css?v=1783807429">
</head>
<body>
<div class="page">

  <div class="internal-bar">Staff Only</div>
  <header class="internal-header">
    <a href="index.html" class="nav-logo">
      <img src="../assets/img/mini-logo-beige.png" alt="SEN Support Studio" />
      <span>Internal Tools</span>
    </a>
    <a href="index.html" class="internal-exit">&larr; Internal Tools</a>
  </header>

  <section class="internal-section">
    <h1>Send Invoice</h1>
    <p class="lede">Attach a school's invoice PDF and send it straight from invoices@sensupportstudio.com, with a copy to your own inbox.</p>

    <div class="internal-card">
      <div id="invoice-send-error" class="form-error hidden"></div>

      <form id="invoice-send-form">
        <div class="internal-form-row">
          <div class="form-field">
            <label for="recipient-name">School / contact name</label>
            <input type="text" id="recipient-name" name="recipientName" required placeholder="e.g. Riverside Primary School">
          </div>
          <div class="form-field">
            <label for="recipient-email">Recipient email</label>
            <input type="email" id="recipient-email" name="recipientEmail" required placeholder="finance@school.sch.uk">
          </div>
        </div>

        <div class="internal-form-row">
          <div class="form-field">
            <label for="cc-email">CC email (optional)</label>
            <input type="email" id="cc-email" name="ccEmail" placeholder="e.g. school office">
          </div>
          <div class="form-field">
            <label for="invoice-subject">Subject</label>
            <input type="text" id="invoice-subject" name="subject" required value="Invoice from SEN Support Studio">
          </div>
        </div>

        <div class="form-field">
          <label for="invoice-message">Covering message</label>
          <textarea id="invoice-message" name="message" rows="4">Please find your invoice attached. Payment can be made by card or bank transfer using the details below.</textarea>
        </div>

        <div class="form-field">
          <label for="payment-instructions">Payment instructions</label>
          <textarea id="payment-instructions" name="paymentInstructions" rows="3" placeholder="Paste the Tide payment link for this invoice, and/or your bank transfer details"></textarea>
        </div>

        <div class="form-field">
          <label for="invoice-file">Invoice PDF</label>
          <input type="file" id="invoice-file" name="invoiceFile" accept="application/pdf" required>
        </div>

        <button type="submit" class="form-submit" id="invoice-send-submit">Send Invoice</button>
      </form>

      <div id="invoice-send-success" class="form-success hidden">
        <h3>Invoice sent</h3>
        <p id="invoice-send-success-detail"></p>
        <button type="button" class="form-submit" id="invoice-send-reset">Send another invoice</button>
      </div>
    </div>
  </section>

</div>
<script src="../js/internal-send-invoice.js?v=1783900000"></script>
</body>
</html>
