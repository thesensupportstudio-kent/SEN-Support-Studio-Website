<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sensory Profile Builder | SEN Support Studio</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bevan&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css?v=1783807429">
</head>
<body>
<div class="page">

  <div class="internal-bar">Staff Only</div>
  <header class="internal-header">
    <a href="index.html" class="nav-logo">
      <img src="../assets/img/mini-logo-beige.png" alt="SEN Support Studio" />
      <span>Internal Tools</span>
    </a>
    <a href="index.html" class="internal-exit">&larr; Internal Tools</a>
  </header>

  <section class="internal-section wizard-section">
    <h1>Sensory Profile Builder</h1>
    <p class="lede">Mostly tick boxes — work through one sense at a time, then send.</p>

    <div id="report-error" class="form-error hidden"></div>

    <div class="internal-card" id="wizard-card">
      <p class="wizard-progress" id="wizard-progress"></p>
      <div id="wizard-root"></div>
      <div class="wizard-nav">
        <button type="button" class="form-submit form-submit-outline" id="wizard-back">&larr; Back</button>
        <button type="button" class="form-submit" id="wizard-next">Next &rarr;</button>
        <button type="button" class="form-submit hidden" id="wizard-submit">Send Report to Client</button>
      </div>
    </div>

    <div id="report-success" class="form-success hidden">
      <h3>Report sent</h3>
      <p id="report-success-detail"></p>
      <button type="button" class="form-submit" id="report-reset">Send another report</button>
    </div>
  </section>

</div>
<script src="../js/internal-reports-sensory.js?v=1783636646"></script>
</body>
</html>
