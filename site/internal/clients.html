<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Clients | SEN Support Studio</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bevan&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css?v=1783807429">
</head>
<body>
<div class="page">

  <div class="internal-bar">Staff Only</div>
  <header class="internal-header">
    <a href="index.html" class="nav-logo">
      <img src="../assets/img/mini-logo-beige.png" alt="SEN Support Studio" />
      <span>Internal Tools</span>
    </a>
    <a href="index.html" class="internal-exit">&larr; Internal Tools</a>
  </header>

  <section class="internal-section clients-section">
    <h1>Clients</h1>
    <p class="lede">Every parent, carer or school who has enquired, been assigned a form, signed an agreement, or received an invoice or report — all in one place.</p>

    <div class="clients-search">
      <input type="search" id="clients-search-input" placeholder="Search by name, email, child or school…">
    </div>

    <div id="clients-error" class="form-error hidden"></div>

    <div class="clients-table-wrap">
      <table class="clients-table" id="clients-table">
        <thead>
          <tr>
            <th>Parent / carer</th>
            <th>Child</th>
            <th>Status</th>
            <th>Last activity</th>
          </tr>
        </thead>
        <tbody id="clients-table-body"></tbody>
      </table>
      <div id="clients-loading" class="clients-loading">Loading clients…</div>
      <div id="clients-empty" class="clients-empty hidden">No clients found yet.</div>
    </div>
  </section>

</div>
<script src="../js/internal-clients.js?v=1784000000"></script>
</body>
</html>
