<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Session Reports | SEN Support Studio</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bevan&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css?v=1783621749">
</head>
<body>
<div class="page">

  <div class="internal-bar">Staff Only</div>
  <header class="internal-header">
    <a href="index.html" class="nav-logo">
      <img src="../assets/img/mini-logo-beige.png" alt="SEN Support Studio" />
      <span>Internal Tools</span>
    </a>
    <a href="index.html" class="internal-exit">&larr; Internal Tools</a>
  </header>

  <section class="internal-section">
    <h1>Session Report</h1>
    <p class="lede">Fill this in after a session — it'll be emailed straight to the client, and a copy will land in your own inbox.</p>

    <div class="internal-card">
      <div id="report-error" class="form-error hidden"></div>

      <form id="report-form">
        <div class="internal-form-row">
          <div class="form-field">
            <label for="client-name">Client / family name</label>
            <input type="text" id="client-name" name="clientName" required placeholder="e.g. The Wilson family">
          </div>
          <div class="form-field">
            <label for="session-date">Session date</label>
            <input type="date" id="session-date" name="sessionDate" required>
          </div>
        </div>

        <div class="internal-form-row">
          <div class="form-field">
            <label for="client-email">Client email</label>
            <input type="email" id="client-email" name="clientEmail" required placeholder="parent@example.com">
          </div>
          <div class="form-field">
            <label for="cc-email">CC email (optional)</label>
            <input type="email" id="cc-email" name="ccEmail" placeholder="e.g. school SENCO">
          </div>
        </div>

        <div class="form-field">
          <label for="service-type">Session type</label>
          <select id="service-type" name="serviceType">
            <option value="1:1 Tuition">1:1 Tuition</option>
            <option value="Sensory Profile Builder">Sensory Profile Builder</option>
            <option value="Support Session">Support Session</option>
            <option value="Sentence Steps Intervention">Sentence Steps Intervention</option>
            <option value="Build Buddies Intervention">Build Buddies Intervention</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-field">
          <label for="summary">What we worked on</label>
          <textarea id="summary" name="summary" rows="6" required placeholder="How the session went, what was covered, how the child engaged..."></textarea>
        </div>

        <div class="form-field">
          <label for="next-steps">Next steps (optional)</label>
          <textarea id="next-steps" name="nextSteps" rows="4" placeholder="Anything to try at home, or focus on next time..."></textarea>
        </div>

        <button type="submit" class="form-submit" id="report-submit">Send Report to Client</button>
      </form>

      <div id="report-success" class="form-success hidden">
        <h3>Report sent</h3>
        <p id="report-success-detail"></p>
        <button type="button" class="form-submit" id="report-reset">Send another report</button>
      </div>
    </div>
  </section>

</div>
<script src="../js/internal-reports.js?v=1783627540"></script>
</body>
</html>
