<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Client | SEN Support Studio</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bevan&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css?v=1783807429">
</head>
<body>
<div class="page">

  <div class="internal-bar">Staff Only</div>
  <header class="internal-header">
    <a href="index.html" class="nav-logo">
      <img src="../assets/img/mini-logo-beige.png" alt="SEN Support Studio" />
      <span>Internal Tools</span>
    </a>
    <a href="clients.html" class="internal-exit">&larr; Clients</a>
  </header>

  <section class="internal-section clients-section">
    <div id="client-error" class="form-error hidden"></div>
    <div id="client-loading" class="clients-loading">Loading client…</div>

    <div id="client-detail" class="hidden">
      <div class="client-detail-header">
        <div>
          <h1 id="client-name"></h1>
          <p class="client-detail-meta" id="client-child"></p>
          <p class="client-detail-meta" id="client-contact"></p>
        </div>
        <div class="client-actions">
          <div class="client-action-dropdown">
            <button type="button" class="form-submit form-submit-outline" id="send-report-btn">Send Report &#9662;</button>
            <div class="client-action-menu hidden" id="send-report-menu">
              <a href="reports-tuition.html">1:1 Tuition Report (Parents/Carers)</a>
              <a href="reports-tuition-school.html">1:1 Pupil Tuition Report (Schools)</a>
              <a href="reports-sensory.html">Sensory Profile Builder</a>
              <a href="reports-support.html">Support Session Summary</a>
              <a href="reports-build-buddies.html">Build Buddies Report (Schools)</a>
              <a href="reports-sentence-steps.html">Sentence Steps Report (Schools)</a>
            </div>
          </div>
          <a href="send-invoice.html" id="send-invoice-btn" class="form-submit">Send Invoice</a>
        </div>
      </div>

      <div class="client-tabs" id="client-tabs">
        <button type="button" class="client-tab active" data-tab="overview">Overview</button>
        <button type="button" class="client-tab" data-tab="forms">Forms</button>
        <button type="button" class="client-tab" data-tab="reports">Reports</button>
        <button type="button" class="client-tab" data-tab="invoices">Invoices</button>
      </div>

      <div id="tab-overview" class="client-tab-panel">
        <div class="client-status-row">
          <label for="client-status-select"><strong>Status</strong></label>
          <select id="client-status-select">
            <option value="enquiry">Enquiry</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="lapsed">Lapsed</option>
          </select>
          <span id="status-save-status" class="notes-save-status"></span>
        </div>

        <div class="internal-card">
          <div class="form-field">
            <label for="client-notes">Notes</label>
            <textarea id="client-notes" rows="4" placeholder="Anything worth remembering about this family…"></textarea>
          </div>
          <button type="button" class="notes-save-btn" id="notes-save-btn">Save notes</button>
          <span id="notes-save-status" class="notes-save-status"></span>
        </div>
      </div>

      <div id="tab-forms" class="client-tab-panel hidden"></div>
      <div id="tab-reports" class="client-tab-panel hidden"></div>
      <div id="tab-invoices" class="client-tab-panel hidden"></div>
    </div>
  </section>

</div>
<script src="../js/internal-client.js?v=1784100000"></script>
</body>
</html>
