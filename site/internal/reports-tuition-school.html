<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>1:1 Pupil Tuition Report (School) | SEN Support Studio</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bevan&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css?v=1784200000">
</head>
<body>
<div class="page">

  <div class="internal-bar">Staff Only</div>
  <header class="internal-header">
    <a href="index.html" class="nav-logo">
      <img src="../assets/img/mini-logo-beige.png" alt="SEN Support Studio" />
      <span>Internal Tools</span>
    </a>
    <a href="index.html" class="internal-exit">&larr; Internal Tools</a>
  </header>

  <section class="internal-section">
    <h1>1:1 Pupil Tuition Report</h1>
    <p class="lede">For schools — target progress, Kent Core Standards area and delivery evidence. Emails to the school contact, with a copy to your own inbox.</p>
    <div id="client-context-banner" class="client-context-banner hidden"></div>

    <div class="internal-card">
      <div id="report-error" class="form-error hidden"></div>

      <form id="report-form">
        <div class="internal-form-row">
          <div class="form-field">
            <label for="pupil-name">Pupil name</label>
            <input type="text" id="pupil-name" name="pupilName" required placeholder="e.g. J. Smith">
          </div>
          <div class="form-field">
            <label for="session-date">Session date</label>
            <input type="date" id="session-date" name="sessionDate" required>
          </div>
        </div>

        <div class="internal-form-row">
          <div class="form-field">
            <label for="school-name">School / recipient name</label>
            <input type="text" id="school-name" name="schoolName" required placeholder="e.g. Oakwood Primary — SENCO">
          </div>
          <div class="form-field">
            <label for="client-email">Recipient email</label>
            <input type="email" id="client-email" name="clientEmail" required placeholder="senco@school.example.com">
          </div>
        </div>

        <div class="form-field">
          <label for="cc-email">CC email (optional)</label>
          <input type="email" id="cc-email" name="ccEmail" placeholder="e.g. class teacher">
        </div>

        <div class="internal-form-row">
          <div class="form-field">
            <label for="hours-logged">Hours logged</label>
            <input type="number" id="hours-logged" name="hoursLogged" step="0.25" min="0" placeholder="e.g. 1">
          </div>
          <div class="form-field">
            <label>Session delivered as planned</label>
            <div class="toggle-row" id="delivered-group">
              <label class="pill-option"><input type="radio" name="delivered" value="yes">Yes</label>
              <label class="pill-option"><input type="radio" name="delivered" value="no">No</label>
            </div>
            <div class="subfield hidden" id="delivered-detail-wrap">
              <input type="text" id="delivered-detail" placeholder="Reason session varied from plan...">
            </div>
          </div>
        </div>

        <div class="form-field">
          <label>Kent Core Standards area</label>
          <div class="pill-group" id="core-standards-group">
            <label class="pill-option"><input type="checkbox" name="coreStandards" value="Communication &amp; Interaction">Communication &amp; Interaction</label>
            <label class="pill-option"><input type="checkbox" name="coreStandards" value="Cognition &amp; Learning">Cognition &amp; Learning</label>
            <label class="pill-option"><input type="checkbox" name="coreStandards" value="Social, Emotional and Mental Health">Social, Emotional and Mental Health</label>
            <label class="pill-option"><input type="checkbox" name="coreStandards" value="Sensory &amp; Physical">Sensory &amp; Physical</label>
          </div>
        </div>

        <div class="form-field">
          <label>Engagement today</label>
          <div class="toggle-row" id="engagement-group">
            <label class="pill-option"><input type="radio" name="engagement" value="Excellent">Excellent</label>
            <label class="pill-option"><input type="radio" name="engagement" value="Good">Good</label>
            <label class="pill-option"><input type="radio" name="engagement" value="Mixed">Mixed</label>
            <label class="pill-option"><input type="radio" name="engagement" value="Found it tough">Found it tough</label>
          </div>
        </div>

        <div class="form-field">
          <label>Areas covered</label>
          <div class="pill-group" id="areas-group">
            <label class="pill-option"><input type="checkbox" name="areas" value="Reading &amp; Phonics">Reading &amp; Phonics</label>
            <label class="pill-option"><input type="checkbox" name="areas" value="Writing">Writing</label>
            <label class="pill-option"><input type="checkbox" name="areas" value="Maths &amp; Number">Maths &amp; Number</label>
            <label class="pill-option"><input type="checkbox" name="areas" value="Speech &amp; Language">Speech &amp; Language</label>
            <label class="pill-option"><input type="checkbox" name="areas" value="Emotional Regulation">Emotional Regulation</label>
            <label class="pill-option"><input type="checkbox" id="area-other-check" name="areas" value="Other">Other</label>
          </div>
          <div class="subfield hidden" id="area-other-wrap">
            <input type="text" id="area-other-detail" placeholder="What else did you cover?">
          </div>
        </div>

        <div class="form-field">
          <label>Targets worked on this session</label>
          <div id="targets-container"></div>
          <button type="button" class="target-add-btn" id="add-target">+ Add another target</button>
        </div>

        <div class="form-field">
          <label for="summary">Session detail / evidence notes</label>
          <textarea id="summary" name="summary" rows="4" required placeholder="How the session went, how the pupil engaged, evidence of progress..."></textarea>
        </div>

        <div class="form-field">
          <label for="next-steps">Recommendations / next steps (optional)</label>
          <textarea id="next-steps" name="nextSteps" rows="3" placeholder="Focus for next session, or recommendations for the school..."></textarea>
        </div>

        <button type="submit" class="form-submit" id="report-submit">Send Report to School</button>
      </form>

      <div id="report-success" class="form-success hidden">
        <h3>Report sent</h3>
        <p id="report-success-detail"></p>
        <button type="button" class="form-submit" id="report-reset">Send another report</button>
      </div>
    </div>
  </section>

</div>
<script src="../js/internal-client-context.js?v=1784000000"></script>
<script src="../js/internal-reports-tuition-school.js?v=1784000000"></script>
</body>
</html>
